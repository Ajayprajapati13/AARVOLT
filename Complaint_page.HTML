<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Support Request Form</title>
  <link rel="stylesheet" href="Design.CSS"> <!-- Linking external CSS -->
</head>
<body>

  <section class="complaint-section">
    <div class="complaint-card">
      <h2 class="form-title">Support Request Form</h2>
      <p class="form-subtitle"></p>

      <!-- Web3Forms integration -->
      <form action="https://api.web3forms.com/submit" method="POST" class="complaint-form">
        <!-- Hidden access key -->
        <input type="hidden" name="access_key" value="4fff01a8-bac9-4c23-93dc-71f317e4c728">

        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Your Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
          <label for="company">Your Organisation</label>
          <input type="text" id="company" name="company" placeholder="Enter your organisation name" required>
        </div>

        <div class="form-group">
          <label for="product">Product Type</label>
          <select id="product" name="product" required>
            <option value="">--Select Product--</option>
            <option value="Motors">Motors</option>
            <option value="Diodes">Diodes</option>
            <option value="Alternators">Alternators</option>
            <option value="Winding">Winding</option>
          </select>
        </div>

        <div class="form-group">
          <label for="complaint">Complaint Details</label>
          <textarea id="complaint" name="message" rows="6" placeholder="Describe your issue..." required></textarea>
        </div>
 <!-- New file upload field -->
        <div class="form-group">
          <label for="attachment">Attach a Picture (Max 10 MB)</label>
          <input type="file" id="attachment" name="attachment" accept="image/*">
        </div>
        <div class="form-group">
          <button type="submit">Submit Complaint</button>
        </div>
      </form>
    </div>
  </section>

</body>
</html>
